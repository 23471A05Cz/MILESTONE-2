<!DOCTYPE html>
<html>
<head>
<title>Chatterbox</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: #e0f0ff; /* soft light blue background */
}

/* Chat container with glowing animated border */
.container{
  width:420px;
  background:#ffffff;
  border-radius:20px;
  padding:0;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  position:relative;
  overflow:hidden;
}

.container::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background: linear-gradient(60deg,#5c7cfa,#00c6ff,#6a5acd,#5c7cfa);
  animation: rotateBorder 4s linear infinite;
  z-index:0;
}

.container::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff; /* inner background */
  border-radius:20px;
  z-index:1;
}

@keyframes rotateBorder{
  0%{transform: rotate(0deg);}
  100%{transform: rotate(360deg);}
}

/* Header */
.header{
  position:relative;
  z-index:2;
  background:#5c7cfa;
  color:white;
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  border-radius:20px 20px 0 0;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

/* Join area */
.join-box{
  position:relative;
  z-index:2;
  display:flex;
  padding:12px;
  gap:10px;
  border-bottom:1px solid #eee;
}

.join-box input{
  flex:1;
  padding:10px;
  border-radius:12px;
  border:1px solid #ccc;
  outline:none;
}

.join-box button{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#5c7cfa;
  color:white;
  cursor:pointer;
  transition: 0.3s;
}

.join-box button:hover{
  background:#4c6ef5;
}

/* Chat area */
#chat{
  position:relative;
  z-index:2;
  height:280px;
  overflow-y:auto;
  padding:15px;
  background:#f7f9fc;
}

/* Messages */
.message{
  display:flex;
  margin:8px 0;
}

.left{
  justify-content:flex-start;
}

.right{
  justify-content:flex-end;
}

.bubble{
  padding:12px 18px;
  border-radius:25px;
  max-width:65%;
  font-size:14px;
  word-wrap:break-word;
}

.left .bubble{
  background:#d0e4ff; 
  color:#000;
}

.right .bubble{
  background:#5c7cfa; 
  color:white;
}

/* System messages */
.system{
  position:relative;
  z-index:2;
  text-align:center;
  font-size:13px;
  color:#555;
  margin:8px 0;
  font-style:italic;
}

/* Input area */
.input-area{
  position:relative;
  z-index:2;
  display:flex;
  padding:12px;
  gap:8px;
  border-top:1px solid #eee;
}

.input-area input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
  outline:none;
}

.input-area button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#5c7cfa;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.input-area button:hover{
  background:#4c6ef5;
}
</style>
</head>

<body>
<div class="container">

<div class="header">Chatterbox</div>

<div class="join-box">
  <input id="username" placeholder="Enter your name">
  <button onclick="joinChat()">Join</button>
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="message" placeholder="Type a message...">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
let ws;
let username;

function joinChat(){
  username=document.getElementById("username").value;

  if(username.trim() === ""){
    alert("Enter your name");
    return;
  }

  ws = new WebSocket(`ws://127.0.0.1:8001/ws/${username}`);

  ws.onmessage=function(event){
    let chat=document.getElementById("chat");
    let data=event.data;

    let div=document.createElement("div");

    if(data.includes("joined") || data.includes("left")){
      div.className="system";
      div.innerText=data;
    }else{
      let sender=data.split(":")[0];
      div.className="message "+(sender===username?"right":"left");

      let bubble=document.createElement("div");
      bubble.className="bubble";
      bubble.innerText=data;

      div.appendChild(bubble);
    }

    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
  };
}

function sendMessage(){
  let input=document.getElementById("message");

  if(input.value.trim()!=""){
    ws.send(input.value);
    input.value="";
  }
}
</script>

</body>
</html>
